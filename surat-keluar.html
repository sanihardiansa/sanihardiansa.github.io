<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administrasi Surat Keluar - RT 04/RW 11</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 500; }
        .form-group input, .form-group textarea { width: 100%; padding: 0.5rem; border: 1px solid #ddd; border-radius: 5px; }
        .form-group textarea { min-height: 100px; resize: vertical; }
        .btn { padding: 0.7rem 1.5rem; border: none; border-radius: 5px; cursor: pointer; font-weight: 500; }
        .btn-primary { background: #3498db; color: white; }
        .btn-primary:hover { background: #2980b9; }
        .btn-success { background: #27ae60; color: white; margin-left: 0.5rem; }
        .btn-danger { background: #e74c3c; color: white; margin-left: 0.5rem; }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; background: white; }
        th, td { padding: 0.8rem; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: #3498db; color: white; }
        tr:hover { background: #f5f5f5; }
        .actions button { padding: 0.3rem 0.8rem; margin-right: 0.3rem; border: none; border-radius: 3px; cursor: pointer; }
        .btn-edit { background: #f39c12; color: white; }
        .btn-delete { background: #e74c3c; color: white; }
    </style>
</head>
<body>
    <nav>
        <div style="display: flex; align-items: center; position: relative; width: 100%;">
            <img src="logo-rt04.svg" alt="Logo RT04" onclick="location.href='index.html'" style="width: 70px; height: 70px; cursor: pointer;">
            <h1 style="flex: 1; text-align: center; margin: 0;">Administrasi Surat Keluar</h1>
            <img src="Lambang_Kota_Bandung.svg.png" alt="Lambang Kota Bandung" style="width: 70px; height: 70px;">
        </div>
    </nav>

    <div class="container">
        <div style="background: white; padding: 2rem; border-radius: 10px; margin-bottom: 2rem;">
            <h2>Input Surat Keluar</h2>
            <form id="formSuratKeluar">
                <div class="form-group">
                    <label>No Surat *</label>
                    <input type="text" id="noSurat" required>
                </div>
                <div class="form-group">
                    <label>Tanggal Surat *</label>
                    <input type="date" id="tanggalSurat" required>
                </div>
                <div class="form-group">
                    <label>Perihal Surat *</label>
                    <input type="text" id="perihalSurat" required>
                </div>
                <div class="form-group">
                    <label>Maksud/Tujuan *</label>
                    <textarea id="maksudTujuan" required></textarea>
                </div>
                <button type="submit" class="btn btn-primary">Simpan</button>
                <button type="button" class="btn btn-success" onclick="exportToExcel()">Export Excel</button>
            </form>
        </div>

        <div style="background: white; padding: 2rem; border-radius: 10px;">
            <h2>Daftar Surat Keluar</h2>
            <input type="text" id="search" placeholder="Cari surat..." style="width: 100%; padding: 0.7rem; margin-bottom: 1rem; border: 1px solid #ddd; border-radius: 5px;">
            <table id="tableSuratKeluar">
                <thead>
                    <tr>
                        <th>No</th>
                        <th>No Surat</th>
                        <th>Tanggal</th>
                        <th>Perihal</th>
                        <th>Maksud/Tujuan</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <script>
        let suratData = JSON.parse(localStorage.getItem('suratKeluar') || '[]');
        let editIndex = -1;

        function render() {
            const tbody = document.querySelector('#tableSuratKeluar tbody');
            const search = document.getElementById('search').value.toLowerCase();
            const filtered = suratData.filter(s => 
                s.noSurat.toLowerCase().includes(search) || 
                s.perihal.toLowerCase().includes(search) ||
                s.maksudTujuan.toLowerCase().includes(search)
            );
            
            tbody.innerHTML = filtered.map((s, i) => `
                <tr>
                    <td>${i + 1}</td>
                    <td>${s.noSurat}</td>
                    <td>${new Date(s.tanggal).toLocaleDateString('id-ID')}</td>
                    <td>${s.perihal}</td>
                    <td>${s.maksudTujuan}</td>
                    <td class="actions">
                        <button class="btn-edit" onclick="edit(${suratData.indexOf(s)})">Edit</button>
                        <button class="btn-delete" onclick="hapus(${suratData.indexOf(s)})">Hapus</button>
                    </td>
                </tr>
            `).join('');
        }

        document.getElementById('formSuratKeluar').addEventListener('submit', (e) => {
            e.preventDefault();
            const data = {
                noSurat: document.getElementById('noSurat').value,
                tanggal: document.getElementById('tanggalSurat').value,
                perihal: document.getElementById('perihalSurat').value,
                maksudTujuan: document.getElementById('maksudTujuan').value
            };
            
            if (editIndex >= 0) {
                suratData[editIndex] = data;
                editIndex = -1;
            } else {
                suratData.push(data);
            }
            
            localStorage.setItem('suratKeluar', JSON.stringify(suratData));
            e.target.reset();
            render();
            alert('Data berhasil disimpan!');
        });

        function edit(index) {
            const s = suratData[index];
            document.getElementById('noSurat').value = s.noSurat;
            document.getElementById('tanggalSurat').value = s.tanggal;
            document.getElementById('perihalSurat').value = s.perihal;
            document.getElementById('maksudTujuan').value = s.maksudTujuan;
            editIndex = index;
            window.scrollTo(0, 0);
        }

        function hapus(index) {
            if (confirm('Yakin ingin menghapus data ini?')) {
                suratData.splice(index, 1);
                localStorage.setItem('suratKeluar', JSON.stringify(suratData));
                render();
            }
        }

        function exportToExcel() {
            let csv = 'No,No Surat,Tanggal,Perihal,Maksud/Tujuan\n';
            suratData.forEach((s, i) => {
                csv += `${i+1},"${s.noSurat}","${new Date(s.tanggal).toLocaleDateString('id-ID')}","${s.perihal}","${s.maksudTujuan}"\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `surat-keluar-${new Date().toISOString().split('T')[0]}.csv`;
            a.click();
        }

        document.getElementById('search').addEventListener('input', render);
        document.getElementById('tanggalSurat').value = new Date().toISOString().split('T')[0];
        render();
    </script>
</body>
</html>
